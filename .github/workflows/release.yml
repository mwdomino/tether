name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT scoped to push the Homebrew formula commit to
          # mwdomino/homebrew-tap. Create at github.com/settings/tokens,
          # grant repo:contents:write on the tap repo, and add as a repo
          # secret here named HOMEBREW_TAP_GITHUB_TOKEN.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  # Build the macOS GUI (.app), attach it to the release, and update the
  # Homebrew cask. Runs after goreleaser so the release and CLI formula exist.
  gui-release:
    needs: goreleaser
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/signing.keychain-db"
          printf '%s' "$CERT_P12" | tr -d '\n' | openssl base64 -d -A > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security default-keychain -s "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KC" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Build, sign, notarize, staple Tether.app
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sh scripts/package-macos.sh "$VERSION" dist
          APP="dist/Tether.app"
          # Sign nested binaries, then the bundle, with the hardened runtime.
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP/Contents/MacOS/tether-cli"
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP/Contents/MacOS/Tether"
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          # Notarize the signed bundle, then staple the ticket to it.
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"
          # Final distributable zip contains the stapled, notarized app.
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/Tether_${VERSION}_darwin_arm64.zip"
      - name: Attach .app to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" "dist/Tether_${VERSION}_darwin_arm64.zip" --clobber
      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA=$(shasum -a 256 "dist/Tether_${VERSION}_darwin_arm64.zip" | awk '{print $1}')
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/mwdomino/homebrew-tap.git" tap
          mkdir -p tap/Casks
          sed -e "s/@@VERSION@@/${VERSION}/g" -e "s/@@SHA@@/${SHA}/g" \
            scripts/tether-cask.rb.tmpl > tap/Casks/tether.rb
          cd tap
          git config user.name "goreleaserbot"
          git config user.email "bot@goreleaser.com"
          git add Casks/tether.rb
          git commit -m "cask: tether ${VERSION}"
          git push
