name: GUI (macOS)
on:
  push:
    branches: [main, tether-updates]
  pull_request:
  workflow_dispatch:

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build tether-gui
        run: go build -o tether-gui-darwin-${{ matrix.arch }} ./cmd/tether-gui
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tether-gui-darwin-${{ matrix.arch }}
          path: tether-gui-darwin-${{ matrix.arch }}
          if-no-files-found: error
