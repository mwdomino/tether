version: 2

project_name: tether

builds:
  - id: tether
    main: ./cmd/tether
    binary: tether
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - id: tether
    name_template: "tether_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"

# Auto-publish Homebrew formula to mwdomino/homebrew-tap on every release.
# Requires the release workflow's GITHUB_TOKEN to have write access to the
# tap repo (use a PAT in HOMEBREW_TAP_GITHUB_TOKEN if the default token is
# scoped to this repo only).
brews:
  - name: tether
    repository:
      owner: mwdomino
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mwdomino/tether"
    description: "Open URLs requested on a headless server in a browser on your desktop, over SSH."
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    directory: Formula
    install: |
      bin.install "tether"
    test: |
      system "#{bin}/tether", "--version"
